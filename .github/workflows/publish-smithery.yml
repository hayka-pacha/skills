name: Publish Skills to Smithery

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed SKILL.md files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: '**/SKILL.md'

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            slug=$(basename $(dirname "$file"))
            git_url="https://github.com/${{ github.repository }}/tree/main/$(dirname "$file")"
            echo "Publishing $slug from $git_url"
            response=$(curl -s -w "\n%{http_code}" -X PUT "https://registry.smithery.ai/skills/hayka-pacha/$slug" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SMITHERY_API_KEY" \
              -d "{\"gitUrl\":\"$git_url\"}")
            echo "$response"
          done
